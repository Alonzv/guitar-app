name: Deploy to Vercel (Production)

# Reliable production deploys that don't depend on Vercel's Git integration.
# Every push to main (or a manual run) builds with the project's own settings
# — which run `npm run build`, so the palette guard + tsc + vite all gate the
# deploy — then promotes the prebuilt output to the production domain.
#
# One-time setup: add three repository secrets under
# Settings → Secrets and variables → Actions:
#   VERCEL_TOKEN        — Vercel → Account Settings → Tokens → Create
#   VERCEL_ORG_ID       — Vercel → (Team) Settings → General → "Team ID"
#   VERCEL_PROJECT_ID   — Vercel → Project → Settings → General → "Project ID"

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never let two production deploys race; newest push wins.
concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Build (runs npm run build → palette guard + tsc + vite)
        run: vercel build --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

      - name: Deploy prebuilt output to production
        run: vercel deploy --prebuilt --prod --token="$VERCEL_TOKEN"
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
