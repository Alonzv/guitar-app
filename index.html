<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#F7F0DC" />
    <meta name="description" content="ScaleUp — chord builder, progressions, and scale visualizer" />

    <!-- CSP lives ONLY in vercel.json (HTTP header). Do NOT add a meta CSP
         here: with two policies the browser enforces their INTERSECTION, so a
         stale meta copy silently re-blocks anything the header allows — that
         exact drift once broke all Supabase auth/DB calls in production. -->
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <title>ScaleUp</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
